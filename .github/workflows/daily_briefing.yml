name: daily-briefing

on:
  schedule:
    # GitHub 예약 이벤트는 정각(:00)에 몰려 드롭·지연이 잦다. 정각을 피한 분(minute)으로
    # 08:07 / 08:37 / 09:07(KST) 3회 시도해 하나라도 걸리게 한다. 오늘 이미 성공 실행됐으면
    # step0_init의 DuplicateRunError로 후속 시도는 즉시 스킵되므로 중복 브리핑은 없다.
    - cron: "7 23 * * *"  # UTC 23:07 = KST 08:07
    - cron: "37 23 * * *" # UTC 23:37 = KST 08:37
    - cron: "7 0 * * *"   # UTC 00:07 = KST 09:07
  workflow_dispatch:
    inputs:
      force_run:
        description: "오늘 이미 성공 실행된 이력이 있어도 강제로 재실행 (수동 테스트용)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: repo-writer
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || 'false' }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://fingerb9-blip.github.io/project/' }}
        run: python main.py

      - name: Commit state & archive
        if: success()
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@users.noreply.github.com"
          mkdir -p data/archive data/state data/dashboard data/stock data/trends data/radar
          git add data/archive data/state data/dashboard data/stock data/trends data/radar
          git commit -m "chore: daily run $(date +%F)" || echo "no changes"
          git fetch origin main
          git rebase origin/main
          git push

      - name: Upload dashboard artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: data/dashboard

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python src/notify.py --event pipeline_failed --run-id ${{ github.run_id }}
