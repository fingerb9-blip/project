# RSS 피드 URL 목록
# 각 항목: name(소스명, source_tiers.yaml과 일치시킬 것), url(RSS 피드 주소)
# 아래 URL은 실제 접속해 응답(200, RSS/XML)을 확인한 것들입니다.
feeds:
  - name: "삼성전자 뉴스룸"
    url: "https://news.samsung.com/kr/feed"
    source_type: "언론"
  - name: "SK하이닉스 뉴스룸"
    url: "https://news.skhynix.co.kr/feed"
    source_type: "언론"
  - name: "디일렉"
    url: "https://www.thelec.kr/rss/allArticle.xml"
    source_type: "언론"
  - name: "EE Times"
    url: "https://www.eetimes.com/feed/"
    source_type: "언론"
  - name: "DigiTimes"
    url: "https://www.digitimes.com/rss/daily.xml"
    source_type: "언론"
  - name: "Semiconductor Engineering"
    url: "https://semiengineering.com/feed/"
    source_type: "언론"

# 네이버 뉴스 검색 API 보강 수집용 키워드
naver_search_keywords:
  - "반도체"
  - "HBM"
  - "파운드리"
  - "EUV"
  - "AI반도체"
  - "수출통제"

# Semantic Scholar 논문 검색 API 보강 수집용 키워드 (영문 권장 - 학술 검색 특성상 매칭률이 높음)
paper_search_keywords:
  - "HBM memory"
  - "EUV lithography"
  - "GAA transistor"

# KIPRIS 특허 공개 검색 API(getWordSearch) 보강 수집용 키워드 (한글 권장 - 국내 출원 특허 제목/초록 매칭)
# KIPRIS_API_KEY 미설정 시 이 소스는 자동으로 건너뜁니다.
patent_search_keywords:
  - "HBM"
  - "EUV 노광"
  - "GAA 트랜지스터"
  - "반도체 패키징"
